services:
  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "9000:9000"      # MinIO API
      - "9001:9001"      # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - netcdf-network

  # Flask Web Application
  flask-app:
    build: .
    container_name: netcdf-explorer
    ports:
      - "5000:5000"
    environment:
      # Flask Configuration
      - FLASK_APP=src/netex/app:create_app
      - NETEX_CONFIG=conf/netex.toml
      - FLASK_DEBUG=true
      - FLASK_SECRET_KEY=docker_dev_secret_key

      # Object Storage Configuration
      - OBJECT_STORAGE_ENDPOINT=minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin123
      - OBJECT_STORAGE_SECURE=false

      # Logger Configuration
      - LOGGER_LEVEL=DEBUG
    depends_on:
      minio:
        condition: service_healthy
    # Bind mounts for local development (change source without rebuilding)
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
    networks:
      - netcdf-network
    restart: unless-stopped

volumes:
  minio_data:
    driver: local

networks:
  netcdf-network:
    driver: bridge