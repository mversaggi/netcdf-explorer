<!doctype html>
<html>
  <head><title>NetCDF Summary</title></head>
  <body>
    <h1>Upload NetCDF File</h1>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <input type="submit" value="Upload">
    </form>
    {% if summary %}
      <h2>Summary</h2>
      <pre>{{ summary }}</pre>
    {% endif %}
  </body>
</html>
